[/Script/EngineSettings.GeneralProjectSettings]
ProjectName=Hexax
Description=Vector tunnel shooter — Unreal Engine port of the Phaser game.

[/Script/UnrealEd.ProjectPackagingSettings]
; Pack cooked content INTO the build (legacy pak/iostore) instead of streaming it
; from a local Zen server. Zen streaming makes the packaged .app non-distributable
; (it dies with "Send to storage server failed" when the server isn't running).
bUseZenStore=False
bUseIoStore=True
; These assets are created by Python and loaded by string path (LoadObject) in C++,
; so the cooker treats them as soft refs and skips them -> packaged build renders
; black with no audio. Force the whole directories to cook.
+DirectoriesToAlwaysCook=(Path="/Game/Materials")
+DirectoriesToAlwaysCook=(Path="/Game/UI")
+DirectoriesToAlwaysCook=(Path="/Game/Audio")
+DirectoriesToAlwaysCook=(Path="/Game/Maps")
