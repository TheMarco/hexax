[/Script/Engine.RendererSettings]
r.DefaultFeature.Bloom=True
r.DefaultFeature.AutoExposure=False
r.DefaultFeature.MotionBlur=False
r.DefaultFeature.AmbientOcclusion=False
r.BloomQuality=5
; FXAA (1) instead of temporal AA — no ghosting/smear on the thin moving neon lines.
r.AntiAliasingMethod=1
; Keep the look identical across desktop GPUs
r.MobileHDR=True
; This is an unlit vector game — disable modern renderer features it never uses.
; (Nanite/Lumen/VSM are the common Mac shipping-build crash sources; the bloom
;  post-process is independent and still works.)
r.Nanite.ProjectEnabled=False
r.DynamicGlobalIlluminationMethod=0
r.ReflectionMethod=0
r.Shadow.Virtual.Enable=0

[/Script/MacTargetPlatform.MacTargetSettings]
; Cook Metal SM5 only. SM6 enables the Nanite render path, which crashes in the
; packaged Shipping build on this Mac (FNaniteRasterPipelines::AllocateFixedFunctionBins).
; This unlit vector game needs nothing SM6-only, so SM5 is the safe target.
!TargetedRHIs=ClearArray
+TargetedRHIs=SF_METAL_SM5

[/Script/Engine.Engine]
; Frame-rate smoothing rewrites DeltaSeconds frame-to-frame, which makes the
; time-integrated rotation easing advance unevenly (choppy turns). Off = raw,
; accurate deltas so the eased rotation tracks real time.
bSmoothFrameRate=False

[SystemSettings]
; VSync OFF: on a 60Hz panel, if a frame misses 16.6ms VSync hard-locks to 30,
; which is the choppiness. Uncapped lets it run at its true rate.
r.VSync=0

